services:
  api:
    image: projectmanager.api
    build:
      context: .
      dockerfile: ProjectManager.Api/Dockerfile
  
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: Y
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  project_storage:
  mssql_data: